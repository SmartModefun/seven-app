<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven App - Día 1: Saludos</title>
    <link rel="icon" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/logo.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #fff;
            margin: 0;
            padding: 0;
            padding-top: 80px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #12121a;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a3a;
            z-index: 100;
        }
        .header-bar img {
            height: 35px;
            cursor: pointer;
        }
        .home-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .day-title {
            text-align: center;
            margin-bottom: 10px;
        }
        .day-title h1 {
            color: #6366f1;
            margin: 0;
            font-size: 28px;
        }
        .day-title p {
            color: #9ca3af;
            margin: 5px 0 0 0;
        }
        .progress-bar {
            background: #1e293b;
            height: 6px;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: #6366f1;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .lesson-card {
            background: #12121a;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            border: 1px solid #2a2a3a;
        }
        .word {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .translation {
            font-size: 28px;
            color: #9ca3af;
            margin-bottom: 15px;
        }
        .pronunciation {
            font-size: 16px;
            color: #6366f1;
            font-style: italic;
            margin-bottom: 20px;
        }
        .audio-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        .audio-btn:hover {
            background: #475569;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .nav-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .nav-btn:hover {
            background: #475569;
        }
        .nav-btn.next {
            background: #6366f1;
        }
        .nav-btn.next:hover {
            background: #4f46e5;
        }
        .lesson-count {
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
            margin: 15px 0;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .tab {
            background: #1e293b;
            color: #9ca3af;
            border: 1px solid #2a2a3a;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
        }
        .tab.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        body.light-mode {
            background: #f5f5f5;
            color: #1a1a2e;
        }
        body.light-mode .header-bar {
            background: #ffffff;
            border-bottom: 1px solid #ddd;
        }
        body.light-mode .lesson-card {
            background: #ffffff;
            border-color: #ddd;
        }
        body.light-mode .word {
            color: #1a1a2e;
        }
        body.light-mode .translation {
            color: #555;
        }
        body.light-mode .day-title h1 {
            color: #4f46e5;
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: #6b7280;
            font-size: 14px;
            border-top: 1px solid #2a2a3a;
            margin-top: 40px;
        }
        .footer a {
            color: #6366f1;
            text-decoration: none;
        }
        body.light-mode .footer {
            color: #555;
            border-top-color: #ddd;
        }
        .theme-toggle {
            background: #334155;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        .theme-toggle:hover {
            background: #475569;
        }
        .access-denied {
            text-align: center;
            padding: 60px 20px;
        }
        .access-denied-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .access-denied h2 {
            margin-bottom: 16px;
        }
        .access-denied p {
            color: #9ca3af;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <img src="assets/logo.png" onclick="window.location.href='index.html'" alt="Seven App">
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar modo">🌙</button>
            <a href="index.html" class="home-btn">← Inicio</a>
        </div>
    </div>

    <div id="courseContent" class="container" style="display: none;">
        <div class="day-title">
            <h1 id="dayTitle">Día 1: Saludos y Presentaciones</h1>
            <p id="daySubtitle">Greetings & Introductions</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="lesson-count">
            <span id="count">1</span> de <span id="total">15</span>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showSection('vocabulary')">📚 Vocabulario</button>
            <button class="tab" onclick="showSection('phrases')">💬 Frases</button>
        </div>

        <div class="lesson-card">
            <div class="word" id="word">Hello</div>
            <div class="translation" id="translation">Hola</div>
            <div class="pronunciation" id="pronunciation">[jelou]</div>
            
            <button class="audio-btn" onclick="playAudio()">
                🔊 Escuchar
            </button>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevLesson()">← Anterior</button>
            <button class="nav-btn next" onclick="nextLesson()">Siguiente →</button>
        </div>
    </div>

    <div id="accessDenied" class="access-denied" style="display: none;">
        <div class="access-denied-icon" id="accessIcon">🔒</div>
        <h2 id="accessTitle">Acceso Restringido</h2>
        <p id="accessMessage">Regístrate y abona $7 para continuar.</p>
        <button class="btn-primary" id="accessBtn" onclick="window.location.href='index.html'">
            Registrarse
        </button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        let currentUser = null;
        let hasAccess = false;
        let currentDay = 1;

        const vocabulary = [
            { word: "Hello", translation: "Hola", pronunciation: "[jelou]" },
            { word: "Good morning", translation: "Buenos días", pronunciation: "[gud morning]" },
            { word: "Good afternoon", translation: "Buenas tardes", pronunciation: "[gud afturnun]" },
            { word: "Good evening", translation: "Buenas noches", pronunciation: "[gud ivning]" },
            { word: "Goodbye", translation: "Adiós", pronunciation: "[gudbai]" },
            { word: "See you later", translation: "Nos vemos luego", pronunciation: "[si iu leider]" },
            { word: "Thank you", translation: "Gracias", pronunciation: "[zank iu]" },
            { word: "Thanks", translation: "Gracias", pronunciation: "[zanks]" },
            { word: "Please", translation: "Por favor", pronunciation: "[pliz]" },
            { word: "Sorry", translation: "Lo siento", pronunciation: "[sori]" },
            { word: "Excuse me", translation: "Disculpe", pronunciation: "[ikskius mi]" },
            { word: "Yes", translation: "Sí", pronunciation: "[ies]" },
            { word: "No", translation: "No", pronunciation: "[nou]" },
            { word: "My name is...", translation: "Me llamo...", pronunciation: "[mai neim iz]" },
            { word: "Nice to meet you", translation: "Mucho gusto", pronunciation: "[nais tu mit iu]" }
        ];

        const phrases = [
            { phrase: "Hello! How are you?", translation: "¡Hola! ¿Cómo estás?" },
            { phrase: "I'm fine, thank you", translation: "Estoy bien, gracias" },
            { phrase: "Nice to meet you", translation: "Mucho gusto" },
            { phrase: "What's your name?", translation: "¿Cómo te llamas?" },
            { phrase: "Where are you from?", translation: "¿De dónde eres?" },
            { phrase: "I'm from Spain", translation: "Soy de España" },
            { phrase: "See you later", translation: "Nos vemos" },
            { phrase: "Have a nice day", translation: "Que tengas un buen día" }
        ];

        let currentSection = 'vocabulary';
        let currentIndex = 0;

        async function checkAccess() {
            const params = new URLSearchParams(window.location.search);
            currentDay = parseInt(params.get('day')) || 1;
            
            document.getElementById('dayTitle').textContent = `Día ${currentDay}: Saludos y Presentaciones`;
            
            if (currentDay === 1) {
                document.getElementById('courseContent').style.display = 'block';
                hasAccess = true;
                return;
            }

            currentUser = firebase.auth().currentUser;
            
            if (!currentUser) {
                document.getElementById('accessDenied').style.display = 'block';
                document.getElementById('courseContent').style.display = 'none';
                document.getElementById('accessIcon').textContent = '🔒';
                document.getElementById('accessTitle').textContent = 'Día ' + currentDay + ' - Acceso Restringido';
                document.getElementById('accessMessage').textContent = 'Regístrate gratis y abona $7 para acceder a los días 2-7.';
                document.getElementById('accessBtn').textContent = 'Registrarse';
                document.getElementById('accessBtn').onclick = () => { window.location.href = 'index.html'; };
                hasAccess = false;
                return;
            }

            if (!currentUser.emailVerified) {
                document.getElementById('accessDenied').style.display = 'block';
                document.getElementById('courseContent').style.display = 'none';
                document.getElementById('accessIcon').textContent = '📧';
                document.getElementById('accessTitle').textContent = 'Email No Verificado';
                document.getElementById('accessMessage').textContent = 'Verifica tu email para continuar.';
                document.getElementById('accessBtn').textContent = 'Reenviar Verificación';
                hasAccess = false;
                return;
            }

            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    const userData = doc.data();
                    hasAccess = userData.courses.includes('ingles-7-dias');
                } else {
                    hasAccess = false;
                }
            } catch (error) {
                hasAccess = false;
            }

            if (hasAccess) {
                document.getElementById('courseContent').style.display = 'block';
            } else {
                document.getElementById('accessDenied').style.display = 'block';
                document.getElementById('courseContent').style.display = 'none';
                document.getElementById('accessIcon').textContent = '💳';
                document.getElementById('accessTitle').textContent = 'Curso No Adquirido';
                document.getElementById('accessMessage').textContent = 'Abona $7 para acceder a los días 2-7.';
                document.getElementById('accessBtn').textContent = 'Comprar Curso - $7';
                document.getElementById('accessBtn').onclick = () => { window.location.href = 'pago.html?course=ingles-7-dias'; };
            }
        }

        function getCurrentData() {
            if (currentSection === 'vocabulary') {
                return vocabulary;
            } else {
                return phrases;
            }
        }

        function showSection(section) {
            currentSection = section;
            currentIndex = 0;
            
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateDisplay();
        }

        function updateDisplay() {
            const data = getCurrentData();
            const item = data[currentIndex];

            document.getElementById('word').textContent = item.word || item.phrase;
            document.getElementById('translation').textContent = item.translation;
            document.getElementById('pronunciation').textContent = item.pronunciation || '';
            document.getElementById('pronunciation').style.display = item.pronunciation ? 'block' : 'none';

            document.getElementById('count').textContent = currentIndex + 1;
            document.getElementById('total').textContent = data.length;

            const progress = ((currentIndex + 1) / data.length) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function nextLesson() {
            const data = getCurrentData();
            if (currentIndex < data.length - 1) {
                currentIndex++;
                updateDisplay();
            } else {
                if (currentSection === 'vocabulary') {
                    currentSection = 'phrases';
                    currentIndex = 0;
                    document.querySelectorAll('.tab').forEach(tab => {
                        tab.classList.remove('active');
                    });
                    document.querySelectorAll('.tab')[1].classList.add('active');
                    updateDisplay();
                } else {
                    window.location.href = 'pago.html?course=ingles-7-dias';
                }
            }
        }

        function prevLesson() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        function playAudio() {
            const data = getCurrentData();
            const item = data[currentIndex];
            const text = item.word || item.phrase;
            
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            } else {
                alert('Tu navegador no soporta audio.');
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeButton();
        }

        function updateThemeButton() {
            const isLight = document.body.classList.contains('light-mode');
            document.querySelector('.theme-toggle').textContent = isLight ? '☀️' : '🌙';
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        firebase.auth().onAuthStateChanged(() => {
            checkAccess();
        });

        updateDisplay();
        updateThemeButton();
    </script>

    <footer class="footer">
        <p>&copy; 2026 Seven App</p>
        <p style="margin-top: 8px;">📧 <a href="mailto:info@seven-app.com">info@seven-app.com</a></p>
    </footer>
</body>
</html>
