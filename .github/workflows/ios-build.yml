name: Build & Upload iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  BUNDLE_ID: 'com.sevenapp.app'

jobs:
  build:
    name: Build and Upload IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -1d /Applications/Xcode_*.app /Applications/Xcode.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Sync web assets to www
        run: node scripts/sync-www.js

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Configure Xcode project
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "App/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "App/Info.plist"

      - name: Copy icons to iOS project
        run: |
          RESOURCES="resources/ios"
          APPSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$APPSET"
          cp "$RESOURCES"/*.png "$APPSET/"
          cat > "$APPSET/Contents.json" << 'EOF'
          {
            "images": [
              {"idiom":"iphone","size":"20x20","filename":"icon-20@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"20x20","filename":"icon-20@3x.png","scale":"3x"},
              {"idiom":"iphone","size":"29x29","filename":"icon-29@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"29x29","filename":"icon-29@3x.png","scale":"3x"},
              {"idiom":"iphone","size":"40x40","filename":"icon-40@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"40x40","filename":"icon-40@3x.png","scale":"3x"},
              {"idiom":"iphone","size":"60x60","filename":"icon-60@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"60x60","filename":"icon-60@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"20x20","filename":"icon-20@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"20x20","filename":"icon-20@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"29x29","filename":"icon-29@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"29x29","filename":"icon-29@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"40x40","filename":"icon-40@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"40x40","filename":"icon-40@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"76x76","filename":"icon-76.png","scale":"1x"},
              {"idiom":"ipad","size":"76x76","filename":"icon-76@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"83.5x83.5","filename":"icon-83.5@2x.png","scale":"2x"},
              {"idiom":"ios-marketing","size":"1024x1024","filename":"icon-1024.png","scale":"1x"}
            ],
            "info": {"author":"xcode","version":1}
          }
          EOF

      - name: Strip alpha from app icons (App Store rejects transparent icons)
        run: |
          python3 -m pip install Pillow -q 2>/dev/null || true
          python3 -c "
          import os
          from PIL import Image
          d='ios/App/App/Assets.xcassets/AppIcon.appiconset'
          for f in os.listdir(d):
              if not f.endswith('.png'): continue
              p=os.path.join(d,f)
              i=Image.open(p).convert('RGBA')
              if any(v[3]<255 for v in i.getdata()):
                  b=Image.new('RGBA',i.size,(255,255,255,255))
                  b.paste(i,(0,0),i);b.convert('RGB').save(p,'PNG')
                  print('fixed: '+f)
          print('done')
          " || echo 'Alpha strip skipped (non-fatal)'

      - name: Setup Code Signing
        env:
          CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          P12_PASSWORD: test1234
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: test1234
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain

          echo "$CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm cert.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          IDENTITY=$(security find-identity -v -p codesigning 2>/dev/null | \
            grep "Apple Distribution" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "IDENTITY=$IDENTITY"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 -d > profile.mobileprovision
          PROFILE_DATA=$(security cms -D -i profile.mobileprovision 2>/dev/null)
          UUID=$(echo "$PROFILE_DATA" | awk -F'[<>]' '/<key>UUID<\/key>/ {getline; print $3}')
          SPECIFIER=$(echo "$PROFILE_DATA" | awk -F'[<>]' '/<key>Name<\/key>/ {getline; print $3}')
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          rm profile.mobileprovision

          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "PROFILE_SPECIFIER=$SPECIFIER" >> $GITHUB_ENV
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

      - name: Install Pods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Patch pbxproj signing identity
        run: |
          cd ios/App
          python3 -c "import os; i=os.environ.get('SIGNING_IDENTITY',''); p='App.xcodeproj/project.pbxproj'; c=open(p).read(); o='CODE_SIGN_STYLE = Manual;'; n='CODE_SIGN_STYLE = Manual;\n\t\t\t\tCODE_SIGN_IDENTITY = \"'+i+'\";'; open(p,'w').write(c.replace(o,n)); print('OK: '+i)"

      - name: Build iOS Archive
        run: |
          cd ios/App
          SCHEME_NAME=$(xcodebuild -list -workspace App.xcworkspace 2>/dev/null | \
            grep -A1 "Schemes:" | tail -1 | xargs)
          xcodebuild archive \
            -workspace "App.xcworkspace" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ../../build/App.xcarchive \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY"

      - name: Export IPA
        run: |
          cat > exportOptions.plist << XCEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>${{ env.BUNDLE_ID }}</key>
                  <string>$PROFILE_SPECIFIER</string>
              </dict>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          XCEOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist exportOptions.plist

      - name: Upload IPA to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
          ASC_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          exec 2>/tmp/upload.log
          set -e
          set -x
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          IPA=$(ls build/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then echo "No IPA found"; exit 1; fi
          echo "Uploading: $IPA ($(stat -f%z "$IPA") bytes)"

          # Install fastlane (ignore brew install failure with || true)
          command -v fastlane && echo "fastlane ready" || {
            brew install fastlane 2>&1 || true
          }
          command -v fastlane || { echo "FAILED: fastlane not available"; exit 1; }

          # Create JSON API key file for fastlane
          mkdir -p fastlane
          echo "app_identifier 'com.sevenapp.app'" > fastlane/Appfile
          echo "team_id '4J94Y6J3DD'" >> fastlane/Appfile
          python3 -c "import json; k=open('$HOME/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8').read(); json.dump({'key_id':'$API_KEY_ID','issuer_id':'$API_ISSUER_ID','key':k,'is_key_content':True,'in_house':False}, open('fastlane/api_key.json','w'))"

          # Upload via fastlane pilot
          fastlane pilot upload \
            --ipa "$IPA" \
            --api_key_path fastlane/api_key.json \
            --skip_waiting_for_build_processing true

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SevenApp.ipa
          path: build/App.ipa
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-upload.log
          path: /tmp/upload.log
          if-no-files-found: warn
