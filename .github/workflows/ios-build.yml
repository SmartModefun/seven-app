name: Build & Upload iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  BUNDLE_ID: 'com.sevenapp.app'

jobs:
  build:
    name: Build and Upload IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -1d /Applications/Xcode_*.app /Applications/Xcode.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Sync Capacitor iOS
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Configure Xcode project for automatic signing
        run: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${{ env.BUNDLE_ID }}" "App/Info.plist" 2>/dev/null || true
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = "";/PROVISIONING_PROFILE_SPECIFIER = "";/g' App.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "App/Info.plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "App/Info.plist"

      - name: Copy icons to iOS project
        run: |
          RESOURCES="resources/ios"
          APPSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$APPSET"
          cp "$RESOURCES"/*.png "$APPSET/"
          cat > "$APPSET/Contents.json" << 'EOF'
          {
            "images": [
              {"idiom":"iphone","size":"20x20","filename":"icon-20@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"20x20","filename":"icon-20@3x.png","scale":"3x"},
              {"idiom":"iphone","size":"29x29","filename":"icon-29@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"29x29","filename":"icon-29@3x.png","scale":"3x"},
              {"idiom":"iphone","size":"40x40","filename":"icon-40@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"40x40","filename":"icon-40@3x.png","scale":"3x"},
              {"idiom":"iphone","size":"60x60","filename":"icon-60@2x.png","scale":"2x"},
              {"idiom":"iphone","size":"60x60","filename":"icon-60@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"20x20","filename":"icon-20@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"20x20","filename":"icon-20@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"29x29","filename":"icon-29@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"29x29","filename":"icon-29@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"40x40","filename":"icon-40@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"40x40","filename":"icon-40@3x.png","scale":"3x"},
              {"idiom":"ipad","size":"76x76","filename":"icon-76.png","scale":"1x"},
              {"idiom":"ipad","size":"76x76","filename":"icon-76@2x.png","scale":"2x"},
              {"idiom":"ipad","size":"83.5x83.5","filename":"icon-83.5@2x.png","scale":"2x"},
              {"idiom":"ios-marketing","size":"1024x1024","filename":"icon-1024.png","scale":"1x"}
            ],
            "info": {"author":"xcode","version":1}
          }
          EOF

      - name: Setup Code Signing
        env:
          CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
          P12_PASSWORD: test1234
          KEYCHAIN_PASSWORD: test1234
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain
          echo "$CERT_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install Pods
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS Archive
        run: |
          cd ios/App
          SCHEME_NAME=$(xcodebuild -list -workspace App.xcworkspace 2>/dev/null | \
            grep -A1 "Schemes:" | tail -1 | xargs)
          xcodebuild archive \
            -workspace "App.xcworkspace" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ../../build/App.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}"

      - name: Export IPA
        run: |
          cat > exportOptions.plist << XCEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.IOS_TEAM_ID }}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          XCEOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload IPA to App Store Connect
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_B64: ${{ secrets.APP_STORE_CONNECT_API_KEY_B64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_B64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_$API_KEY_ID.p8
          IPA=$(ls build/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then exit 1; fi
          xcrun altool --upload-app \
            -f "$IPA" \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            --type ios

      - name: Upload IPA as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SevenApp.ipa
          path: build/App.ipa
          if-no-files-found: warn
